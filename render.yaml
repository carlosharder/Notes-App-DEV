services:
  - type: web
    runtime: python
    name: notes-app
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      name: notes-storage
      mountPath: /var/data/notes
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: APP_USERNAME
        sync: false
      - key: PASSWORD_HASH
        sync: false
      - key: NOTES_DIR
        value: /var/data/notes
      - key: PYTHON_VERSION
        value: "3.11.6"
