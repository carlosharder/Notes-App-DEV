services:
  - type: web
    runtime: python
    name: notes-app
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile -
    healthCheckPath: /healthz
    disk:
      name: media-storage
      mountPath: /var/data/media
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString
      - key: MEDIA_DIR
        value: /var/data/media
      - key: PYTHON_VERSION
        value: "3.11.6"

databases:
  - name: notes-db
    plan: starter
    databaseName: notes
    user: notes_user
