{% extends "base.html" %}
{% block title %}{{ note.title }}{% endblock %}
{% block content %}

<h1 style="margin-bottom: 0.25rem;">{{ note.title }}</h1>
<p class="text-muted" style="margin-bottom: 1rem;">
    Created: {{ note.created|format_date }} &nbsp;|&nbsp; Modified: {{ note.modified|format_date }}
</p>

<div class="gap-sm" style="display: flex; margin-bottom: 1.5rem;">
    <a href="/notes/{{ note.slug }}/edit" class="btn btn-primary">Edit</a>
    <form method="POST" action="/notes/{{ note.slug }}/delete" style="display:inline;"
          onsubmit="return confirm('Delete this note?');">
        <button type="submit" class="btn btn-danger">Delete</button>
    </form>
</div>

<div class="card md-content">
    {{ content|safe }}
</div>

<p class="mt-2"><a href="/notes">&larr; All notes</a></p>

{% endblock %}
