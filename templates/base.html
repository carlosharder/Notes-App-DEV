<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f2f1ed">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>Notes</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-initial-slug="{{ initial_slug|default('', true) }}">
    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Notes</span>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="new-note-btn" title="New Note (Ctrl+N)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="sidebar-search">
                <input type="search" id="sidebar-search" placeholder="Search" autocomplete="off">
            </div>
            <div class="sidebar-list" id="sidebar-list">
                <!-- Loaded via JS -->
            </div>
            <div class="sidebar-footer">
                <span class="note-count" id="sidebar-count"></span>
                <a href="/logout" class="icon-btn" title="Logout" style="color: var(--text-tertiary); text-decoration: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </a>
            </div>
        </aside>

        <!-- Content Panel -->
        <main class="content-panel">
            <div class="content-toolbar">
                <div class="toolbar-left">
                    <button class="icon-btn mobile-back-btn" id="mobile-back-btn" title="Back">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <span class="save-indicator" id="save-indicator"></span>
                </div>
                <div class="toolbar-right">
                    <button class="icon-btn" id="edit-btn" title="Edit (Ctrl+E)" style="display:none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </button>
                    <button class="icon-btn danger" id="delete-btn" title="Delete" style="display:none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                    <img src="/static/logo.jpg" alt="Logo" class="toolbar-logo">
                </div>
            </div>
            <div class="content-body" id="content-body">
                <!-- Loaded via JS -->
            </div>
        </main>
    </div>

    <!-- Wiki-link autocomplete dropdown -->
    <div class="link-autocomplete" id="link-autocomplete"></div>

    <script src="/static/app.js"></script>
</body>
</html>
