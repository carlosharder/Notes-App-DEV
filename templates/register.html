<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f2f1ed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>Notes - Register</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1 class="login-title">Notes</h1>
            <p class="login-subtitle">Create your account</p>
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for msg in messages %}
            <div class="login-error">{{ msg }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="login-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                           minlength="3" maxlength="80">
                </div>
                <div class="login-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="login-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required
                           minlength="8">
                </div>
                <button type="submit" class="login-submit">Create Account</button>
            </form>
            <p class="login-alt">Already have an account? <a href="/login">Sign in</a></p>
        </div>
    </div>
</body>
</html>
